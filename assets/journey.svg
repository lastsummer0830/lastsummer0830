<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200" role="img" aria-label="조아진의 여정: 요식업 헤드셰프에서 백엔드 개발자로">
  <title>여정 — 요식업 헤드셰프에서 백엔드 개발자로</title>

  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F7C9BC"/>
      <stop offset="38%"  stop-color="#EFD3B8"/>
      <stop offset="70%"  stop-color="#C3D9F2"/>
      <stop offset="100%" stop-color="#BCE0D2"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFCF9"/>
      <stop offset="100%" stop-color="#FDF6F1"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="1000" height="200" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1000" height="200" fill="url(#paper)"/>

    <!-- 배경 결 -->
    <g stroke="#8E82C4" stroke-opacity="0.05">
      <line x1="0" y1="50" x2="1000" y2="50"/>
      <line x1="0" y1="150" x2="1000" y2="150"/>
    </g>

    <!-- 트랙: 왼쪽(요식업 피치) → 오른쪽(개발 민트) -->
    <rect x="90" y="96" width="820" height="8" rx="4" fill="#EFE7E1"/>
    <rect x="90" y="96" width="820" height="8" rx="4" fill="url(#track)">
      <animate attributeName="width" from="0" to="820" dur="2.4s" fill="freeze"/>
    </rect>

    <!-- 트랙 위를 흐르는 반짝임 -->
    <circle cy="100" r="4" fill="#FFFFFF" opacity="0.9">
      <animate attributeName="cx" values="90;910" dur="5s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="5s" begin="2.4s" repeatCount="indefinite"/>
    </circle>

    <g font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic','맑은 고딕','Noto Sans KR',sans-serif"
       text-anchor="middle">

      <!-- 1. 요식업 -->
      <g>
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
        <circle cx="150" cy="100" r="13" fill="#F7C9BC" stroke="#FFFFFF" stroke-width="3"/>
        <text x="150" y="62"  font-size="14" font-weight="800" fill="#4A4458">요식업 5년 반</text>
        <text x="150" y="145" font-size="12" font-weight="600" fill="#8A8299">현장</text>
      </g>

      <!-- 2. 헤드셰프 -->
      <g>
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.0s" fill="freeze"/>
        <circle cx="390" cy="100" r="13" fill="#EFC9A8" stroke="#FFFFFF" stroke-width="3"/>
        <text x="390" y="62"  font-size="14" font-weight="800" fill="#4A4458">헤드셰프</text>
        <text x="390" y="145" font-size="12" font-weight="600" fill="#8A8299">자격증 없이 실력으로</text>
      </g>

      <!-- 3. 전향 -->
      <g>
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.6s" fill="freeze"/>
        <circle cx="620" cy="100" r="13" fill="#C3D9F2" stroke="#FFFFFF" stroke-width="3"/>
        <text x="620" y="62"  font-size="14" font-weight="800" fill="#4A4458">에이콘아카데미</text>
        <text x="620" y="145" font-size="12" font-weight="600" fill="#8A8299">2026.01 — 07 · Java 백엔드</text>
      </g>

      <!-- 4. 지금 -->
      <g>
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.2s" fill="freeze"/>
        <circle cx="860" cy="100" r="15" fill="#A8D8C4" stroke="#FFFFFF" stroke-width="3">
          <animate attributeName="r" values="15;17;15" dur="2.6s" begin="2.7s" repeatCount="indefinite"/>
        </circle>
        <text x="860" y="62"  font-size="14" font-weight="800" fill="#3E6E5C">백엔드 개발자</text>
        <text x="860" y="145" font-size="12" font-weight="600" fill="#8A8299">지금 여기</text>
      </g>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="999" height="199" rx="16" fill="none" stroke="#EFE3DA"/>
</svg>
