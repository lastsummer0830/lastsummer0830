<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 268" width="480" height="268" role="img" aria-label="언어 비중: Java 37.2%, TypeScript 22.8%, JSP/Servlet 19.0%, CSS 14.2%, HTML 4.4%, 기타 2.4%">
  <title>언어 비중</title>
  <defs>
    <linearGradient id="lpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDFB"/><stop offset="100%" stop-color="#FAF6FD"/>
    </linearGradient>
  </defs>
  <style>
    .lg-t{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
    .lg-title{font-size:12px;font-weight:700;letter-spacing:.16em;fill:#8F88A6;}
    .lg-lab{font-size:14px;font-weight:600;fill:#443C5C;}
    .lg-pct{font-size:13px;font-weight:600;fill:#8F88A6;}
    .lg-c1{font-size:23px;font-weight:700;fill:#443C5C;}
    .lg-c2{font-size:14px;font-weight:600;fill:#918AA6;}
  </style>
  <rect width="480" height="268" rx="16" fill="url(#lpaper)"/>

  <!-- donut -->
  <g>
    <circle cx="148" cy="138" r="64" fill="none" stroke="#F0ECF6" stroke-width="30"/>
    <g transform="rotate(-90 148 138)" fill="none" stroke-width="30">
      <circle cx="148" cy="138" r="64" stroke="#A99BE8" stroke-dasharray="149.59 402.12" stroke-dashoffset="0"/>
      <circle cx="148" cy="138" r="64" stroke="#8FC4EE" stroke-dasharray="91.68 402.12" stroke-dashoffset="-149.59"/>
      <circle cx="148" cy="138" r="64" stroke="#86D3B4" stroke-dasharray="76.40 402.12" stroke-dashoffset="-241.27"/>
      <circle cx="148" cy="138" r="64" stroke="#F5B49B" stroke-dasharray="57.10 402.12" stroke-dashoffset="-317.67"/>
      <circle cx="148" cy="138" r="64" stroke="#F3D08A" stroke-dasharray="17.69 402.12" stroke-dashoffset="-374.77"/>
      <circle cx="148" cy="138" r="64" stroke="#C9C4D6" stroke-dasharray="9.65 402.12" stroke-dashoffset="-392.46"/>
    </g>
    <text class="lg-t lg-c1" x="148" y="133" text-anchor="middle">Java</text>
    <text class="lg-t lg-c2" x="148" y="156" text-anchor="middle">37.2%</text>
  </g>

  <!-- legend -->
  <text class="lg-t lg-title" x="272" y="40">LANGUAGE MIX</text>
  <g>
    <g><circle cx="278" cy="72" r="6" fill="#A99BE8"/><text class="lg-t lg-lab" x="294" y="76">Java</text><text class="lg-t lg-pct" x="452" y="76" text-anchor="end">37.2%</text></g>
    <g><circle cx="278" cy="103" r="6" fill="#8FC4EE"/><text class="lg-t lg-lab" x="294" y="107">TypeScript</text><text class="lg-t lg-pct" x="452" y="107" text-anchor="end">22.8%</text></g>
    <g><circle cx="278" cy="134" r="6" fill="#86D3B4"/><text class="lg-t lg-lab" x="294" y="138">JSP / Servlet</text><text class="lg-t lg-pct" x="452" y="138" text-anchor="end">19.0%</text></g>
    <g><circle cx="278" cy="165" r="6" fill="#F5B49B"/><text class="lg-t lg-lab" x="294" y="169">CSS</text><text class="lg-t lg-pct" x="452" y="169" text-anchor="end">14.2%</text></g>
    <g><circle cx="278" cy="196" r="6" fill="#F3D08A"/><text class="lg-t lg-lab" x="294" y="200">HTML</text><text class="lg-t lg-pct" x="452" y="200" text-anchor="end">4.4%</text></g>
    <g><circle cx="278" cy="227" r="6" fill="#C9C4D6"/><text class="lg-t lg-lab" x="294" y="231">Other</text><text class="lg-t lg-pct" x="452" y="231" text-anchor="end">2.4%</text></g>
  </g>
  <rect x="0.5" y="0.5" width="479" height="267" rx="16" fill="none" stroke="#ECE6F2"/>
